<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title> WDD131 - Dynamic Web Fundamentals - Agha Idam Walter </title>
    <meta name="description" content="WDD131 - Dynamic Web Fundamentals Product review Form for W05, created by Agha Idam Walter.">
    <meta name="author" content="Agha Idam Walter">
    <link rel="stylesheet" href="styles/form.css">
    <script id="el" src="scripts/form.js" defer>
    </script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>
    <main>
        <form id="reviewForm" action="review.html" method="get">
            <label for="product">Product Name:</label>
            <select id="product" name="product" size="5" required>
                <option disabled selected>Select a Product ...</option>
            </select>


            <fieldset>
                <legend>Overall Rating</legend>

                <div class="rating-group">
                    <div class="rating-item">
                        <label for="star1">☆</label>
                        <input type="radio" id="star1" name="rating" value="1" required>
                    </div>

                    <div class="rating-item">
                        <label for="star2">☆☆</label>
                        <input type="radio" id="star2" name="rating" value="2" required>
                    </div>

                    <div class="rating-item">
                        <label for="star3">☆☆☆</label>
                        <input type="radio" id="star3" name="rating" value="3" required>
                    </div>

                    <div class="rating-item">
                        <label for="star4">☆☆☆☆</label>
                        <input type="radio" id="star4" name="rating" value="4" required>
                    </div>

                    <div class="rating-item">
                        <label for="star5">☆☆☆☆☆</label>
                        <input type="radio" id="star5" name="rating" value="5" required>
                    </div>
                </div>

            </fieldset>


            <label for="installDate">Installation Date:</label>
            <input type="date" id="installDate" name="installDate" required>


            <div class="radio-group">
                <p>Which features did you find useful in the product? (Check all that apply)</p>

                <div class="checkbox-group">
                    <input type="checkbox" id="f1" name="features" value="Value for Money">
                    <label for="f1">Value for Money</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="f2" name="features" value="Durable">
                    <label for="f2">Durable</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="f3" name="features" value="Easy to Use">
                    <label for="f3">Easy to Use</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="f4" name="features" value="Performance">
                    <label for="f4">Performance</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="f5" name="features" value="Design">
                    <label for="f5">Design</label>
                </div>
            </div>

            <div class="textarea-group">
                <label for="review">Written Review:</label>
                <textarea id="review" name="review"></textarea>
            </div>

            <div class="input-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <input type="submit" value="Submit Review">
        </form>
    </main>
    <footer>
        <p>
            &copy;<span id="currentYear"></span> || Agha Idam Walter || Nigeria || All rights reserved.
        </p>
        <p id="lastModified">

        </p>
    </footer>
</body>
</html>
